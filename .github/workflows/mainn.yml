name: OpenRouter Model Monitor

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  check-models:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install requests
    
    - name: Check models and send notification
      env:
        PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        PUSHPLUS_TOPIC: ${{ secrets.PUSHPLUS_TOPIC }}
      run: python openrouter-monitor-pushplus.py
    
    - name: Commit cache
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "chore: update model cache"
        file_pattern: "*.json"
