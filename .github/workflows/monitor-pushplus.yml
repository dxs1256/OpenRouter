name: OpenRouter Model Monitor

on:
  schedule:
    # 每小时运行一次（UTC 时间）
    - cron: '0 * * * *'
  workflow_dispatch:
    # 允许手动触发

jobs:
  check-models:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
    
    - name: 设置 Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install requests
    
    - name: 检查新模型并推送 PushPlus 通知
      env:
        PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        PUSHPLUS_TOPIC: ${{ secrets.PUSHPLUS_TOPIC }}
      run: python openrouter-monitor-pushplus.py
    
    - name: 提交缓存更新
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "chore: update model cache"
        file_pattern: "*.json"
        branch: main
